name: Mirror to GitHub
on:
  push:
    branches: ["**"]
    tags: ["v*"]
jobs:
  mirror:
    runs-on: ubuntu-latest
    steps:
      - uses: https://github.com/actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Push to GitHub mirror
        env:
          GH_MIRROR_TOKEN: ${{ secrets.GH_MIRROR_TOKEN }}
        run: |
          remote="https://x-access-token:${GH_MIRROR_TOKEN}@github.com/fusionAIze/fusionaize-sdk.git"
          git push --force --prune "$remote" '+refs/heads/*:refs/heads/*'
          git push --force "$remote" '+refs/tags/*:refs/tags/*'
