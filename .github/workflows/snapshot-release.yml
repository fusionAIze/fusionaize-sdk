name: Snapshot Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Snapshot tag (e.g., alpha, beta, rc)'
        required: true
        default: 'snapshot'
      publish:
        description: 'Publish to npm registry'
        required: true
        default: false
        type: boolean
  pull_request:
    branches: [main]
    types: [labeled]
    labels: ['snapshot-release']

jobs:
  snapshot:
    if: ${{ github.server_url == 'https://github.com' }}
    name: Create Snapshot Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'
          registry-url: 'https://registry.npmjs.org/'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build packages
        run: pnpm build

      - name: Configure Git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      - name: Create snapshot version
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            TAG="${{ github.event.inputs.tag }}"
            PUBLISH="${{ github.event.inputs.publish }}"
          else
            TAG="pr-${{ github.event.pull_request.number }}"
            PUBLISH="false"
          fi

          echo "Creating snapshot with tag: ${TAG}"
          echo "Publish to npm: ${PUBLISH}"

          # Create snapshot versions using Changesets
          pnpm exec changeset version --snapshot "${TAG}"

          # Get the snapshot version from any package.json
          SNAPSHOT_VERSION=$(node -p "require('./packages/sdk-core/package.json').version")
          echo "SNAPSHOT_VERSION=${SNAPSHOT_VERSION}" >> "$GITHUB_ENV"
          echo "TAG=${TAG}" >> "$GITHUB_ENV"

      - name: Create snapshot build
        run: pnpm build

      - name: Publish snapshot packages (if enabled)
        if: ${{ github.event.inputs.publish == 'true' && github.event_name == 'workflow_dispatch' }}
        run: pnpm exec changeset publish --tag "${{ env.TAG }}"
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Create GitHub Release (snapshot)
        if: ${{ github.event.inputs.publish == 'true' && github.event_name == 'workflow_dispatch' }}
        uses: softprops/action-gh-release@v1
        with:
          tag_name: snapshot-${{ env.SNAPSHOT_VERSION }}
          name: "Snapshot Release ${{ env.SNAPSHOT_VERSION }}"
          prerelease: true
          generate_release_notes: true
          draft: false

      - name: Comment on PR with snapshot version
        if: ${{ github.event_name == 'pull_request' }}
        uses: actions/github-script@v7
        with:
          script: |
            const version = process.env.SNAPSHOT_VERSION;
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `📦 Snapshot version created: **${version}**\n\nYou can test this snapshot by installing:\n\`\`\`bash\nnpm install @fusionaize/sdk-core@${version}\n\`\`\`\n\nNote: This is a temporary snapshot release for testing purposes only.`
            });

      - name: Clean up snapshot changes (for PR triggers)
        if: ${{ github.event_name == 'pull_request' }}
        run: |
          # Reset the snapshot version changes to avoid committing them
          git checkout -- .
          git clean -fd